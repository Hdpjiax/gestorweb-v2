<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self'; script-src 'self'; img-src 'self' data:; object-src 'none'; frame-src http: https: about:;" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>New Tab</title>
  <link rel="stylesheet" href="profile-browser.css" />
</head>
<body>
  <header class="browser-chrome">
    <div class="tab-strip">
      <div class="profile-mark" aria-hidden="true"></div>
      <div class="active-tab">
        <span class="tab-favicon" aria-hidden="true">●</span>
        <span id="tabTitle">New Tab</span>
      </div>
      <div class="engine-label" id="engineLabel"></div>
      <div class="window-controls">
        <button type="button" data-window="minimize" aria-label="Minimizar">─</button>
        <button type="button" data-window="maximize" aria-label="Maximizar">□</button>
        <button type="button" class="close" data-window="close" aria-label="Cerrar">×</button>
      </div>
    </div>
    <div class="navigation-bar">
      <button id="backButton" class="nav-button" type="button" aria-label="Atrás" disabled>
        <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <button id="forwardButton" class="nav-button" type="button" aria-label="Adelante" disabled>
        <svg viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg>
      </button>
      <button id="reloadButton" class="nav-button" type="button" aria-label="Recargar">
        <svg viewBox="0 0 24 24"><path d="M20 11a8 8 0 10-2.3 5.7M20 4v7h-7"/></svg>
      </button>
      <form id="addressForm" class="address-form">
        <span id="securityIcon" class="security-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M16 16l5 5"/></svg>
        </span>
        <input id="addressInput" autocomplete="off" spellcheck="false" placeholder="Search or enter address" aria-label="Dirección" />
      </form>
      <div id="routeBadge" class="route-badge">perfil aislado</div>
    </div>
  </header>
  <main id="browserStage" class="browser-stage">
    <div id="blankSurface" class="blank-surface">
      <div class="blank-glow"></div>
    </div>
    <div id="errorSurface" class="error-surface" hidden>
      <strong>No se pudo abrir esta página</strong>
      <span id="errorText"></span>
      <button id="retryButton" type="button">Reintentar</button>
    </div>
  </main>
  <script src="profile-browser.js"></script>
</body>
</html>
